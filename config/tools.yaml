tools:
  - name: deepresearch_bugfix
    title: Bug Fix Deep Research
    description: |
      **WHEN:** Code is broken, throwing errors, or behaving unexpectedly and your fix attempts failed — never retry debugging without using this first.
      
      **WHAT:** Senior engineer research across Stack Overflow, GitHub issues, and official docs to identify root causes and proven solutions for your specific error or bug pattern.
      
      **INCLUDE:** Complete background (what you tried, what failed), exact error messages word-for-word with full stack traces, and attach ALL relevant files plus connected files via `file_attachments` for full context. The researcher has zero prior knowledge — provide comprehensive details like you're filing a detailed bug report.
      
      **USE:** Abundantly during any debugging session. This is specifically designed to unstick you when code breaks — not for planning or learning, purely for fixing what's broken right now.

  - name: deepresearch_code_planning
    title: Code Planning Deep Research
    description: |
      **WHEN:** Starting any new feature or mid-to-large implementation where existing libraries/abstractions could simplify your work — never build significant new functionality without checking first.
      
      **WHAT:** Principal engineer research that discovers battle-tested libraries, utilities, and architectural patterns (prioritizing high-star GitHub repos and production-grade solutions) to minimize code through proven abstractions instead of building from scratch.
      
      **INCLUDE:** What you're building and why, your current tech stack and constraints, desired outcome and requirements, and attach existing project files via `file_attachments` so recommendations are compatible with your architecture. The researcher starts fresh each time — be explicit about your entire context.
      
      **USE:** Proactively before writing significant new code, when unsure which library/pattern to adopt, or when thinking "there's probably an existing solution for this." Critical for keeping codebases lean and avoiding reinventing the wheel — especially important for AI agents managing token limits.

  - name: deepresearch_expert_intelligence  
    title: Expert Intelligence Deep Research
    description: |
      **WHEN:** You need deep understanding, validation, or multi-perspective analysis on ANY topic that's NOT a bugfix or finding libraries — use when uncertain about concepts, need current information beyond your training, or require evidence-based decision making.
      
      **WHAT:** Expert consultant research across technical docs, industry blogs, academic sources, and case studies covering both technical topics (algorithms, protocols, architecture philosophy, framework comparisons) and non-technical domains (market trends, business strategy, process optimization, competitive analysis).
      
      **INCLUDE:** Precise topic with full context (why this matters, what decision it informs), 3-7 specific questions you need answered, your current understanding or assumptions (to fill gaps not repeat basics), desired depth level, any constraints or priorities, and use `file_attachments` if research relates to existing codebase or documents. The researcher knows nothing about your conversation — brief them like an expert who just joined.
      
      **USE:** Aggressively when you think "I'm not 100% confident," "is my understanding current?", "what are the trade-offs?", or when evaluating technologies, learning complex systems, understanding best practices, or researching any domain knowledge (technical or business) that doesn't fit the other two tools.

  - name: scrape_links
    title: Universal URL Content Scraper
    description: |
      **Universal URL content extraction tool** with batch processing (1-5 URLs), intelligent fallback modes, and optional AI-powered content extraction. This is your primary tool for any web scraping task.
      
      **MODES:**
      - **basic** (default): Fast datacenter proxies for static content (1 credit/URL)
      - **javascript**: Headless browser for SPAs and dynamic sites (5 credits/URL)  
      - **premium**: Residential proxies for geo-targeting and anti-bot bypass (10 credits/URL)
      
      **AI EXTRACTION:** Set `use_llm=true` (default) with optional `what_to_extract` instructions to intelligently filter and clean content.
      
      **USE:** After web searches to extract content from discovered URLs. Batch up to 5 URLs per call. Start with basic mode, upgrade to javascript for React/Vue/Angular sites, use premium only for geo-restricted content.

  - name: search_multiple
    title: Batch Web Search
    description: |
      **Batch web search** using Google via SERPER API. Search up to 100 keywords in parallel, get top 10 results per keyword with snippets, links, and related searches.
      
      **FEATURES:**
      - Supports Google search operators (site:, -exclusion, "exact phrase", filetype:)
      - Returns clickable markdown links with snippets
      - Provides related search suggestions
      - Identifies frequently appearing URLs across queries
      
      **USE:** For research tasks requiring multiple perspectives. Use distinct keywords to maximize coverage. Follow up with `scrape_links` to extract full content from promising URLs.

  - name: validate_task_completion
    title: Carmack-Grade Task Completion Validator
    description: |
      **WHEN:** Before shipping code to production, or when validating completion claims — use this to get forensic code analysis at John Carmack's Mars Rover standards where remote fixes are impossible.
      
      **WHAT:** Uncompromising line-by-line code inspection that validates completion claims against actual implementation. Analyzes error handling, logging, code quality, DRY/SOLID compliance, and compares claimed vs actual completion percentage. Returns detailed validation with specific fixes for all critical issues.
      
      **INCLUDE:** Original requirements (PRD format), claimed completion percentage, working/non-working features lists, implementation status mapping, file paths to analyze, execution proofs (command outputs, API responses, logs), and any critical code sections. The validator reads actual files from disk and performs forensic analysis.
      
      **USE:** When you need honest assessment of task completion, before production deployment, when debugging why "complete" code fails, or when validating if claimed percentages match reality. Critical for maintaining code quality and catching issues before they reach production.